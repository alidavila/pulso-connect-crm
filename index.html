<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PulsoConnect CRM</title>
    <style>
        :root {
            --bg: #050508; --card: #0d0d14; --border: #1a1a28;
            --text: #d4d4dc; --muted: #6b6b7a; --accent: #c9a84c;
            --accent-soft: rgba(201,168,76,0.12); --green: #22c55e;
            --purple: #7c3aed; --warn: #eab308; --red: #ef4444; --blue: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; padding: 12px 12px 90px; font-size: 14px;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 4px 14px; position: sticky; top: 0;
            background: var(--bg); z-index: 10;
        }
        header h1 { font-size: 18px; font-weight: 700; color: #fff; }
        header h1 span { color: var(--accent); }
        .timestamp { font-size: 11px; color: var(--muted); }

        .sdot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .sdot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .sdot.pending { background: var(--warn); }

        /* Stats row */
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
        .stat-card .num { font-size: 26px; font-weight: 700; color: var(--accent); }
        .stat-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        /* System cards */
        .sys-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 8px; margin-bottom: 16px; }
        .sys-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: all .2s; }
        .sys-card:active { transform: scale(.97); }
        .sys-card.expanded { border-color: var(--accent); }
        .sys-card h3 { font-size: 13px; color: #fff; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .sys-card .metric { font-size: 22px; font-weight: 700; color: var(--accent); margin: 6px 0; }
        .sys-card .details { display: none; margin-top: 10px; font-size: 11px; }
        .sys-card.expanded .details { display: block; }
        .sys-card .dr { display: flex; justify-content: space-between; padding: 3px 0; color: var(--muted); }
        .sys-card .dr span:last-child { color: var(--text); font-weight: 500; }

        /* Section */
        .sect { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 18px 0 8px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }

        /* Table */
        .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
        .tbl th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px 6px; border-bottom: 1px solid var(--border); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tbl td { padding: 10px 6px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .tbl tr { cursor: pointer; transition: background .15s; }
        .tbl tr:hover { background: var(--accent-soft); }

        /* Tags */
        .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
        .tag-active { background: rgba(34,197,94,0.15); color: var(--green); }
        .tag-idea { background: rgba(124,58,237,0.15); color: var(--purple); }
        .tag-diseno { background: rgba(59,130,246,0.15); color: var(--blue); }
        .tag-wip { background: rgba(234,179,8,0.15); color: var(--warn); }
        .tag-default { background: rgba(107,107,122,0.15); color: var(--muted); }

        /* Cards */
        .card-list { display: flex; flex-direction: column; gap: 6px; }
        .lcard { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all .2s; }
        .lcard:hover { border-color: var(--accent); }
        .lcard .top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 4px; }
        .lcard .title { font-weight: 600; color: #fff; font-size: 13px; }
        .lcard .desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
        .lcard .meta { font-size: 10px; color: var(--muted); margin-top: 6px; display: flex; gap: 12px; }
        .lcard.expanded .desc-full { display: block; }
        .lcard .desc-full { display: none; margin-top: 8px; font-size: 12px; color: var(--text); line-height: 1.6; }

        /* Activity */
        .log-entry { display: flex; gap: 10px; padding: 8px 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 4px; font-size: 12px; }
        .log-time { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 48px; }
        .log-icon { font-size: 14px; }
        .log-text { flex: 1; }
        .log-text a { color: var(--accent); }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 50; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 20px; max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal h3 { color: #fff; margin-bottom: 14px; }
        .modal label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; margin-top: 10px; text-transform: uppercase; }
        .modal input, .modal textarea, .modal select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-size: 13px; font-family: inherit; margin-bottom: 4px; }
        .modal textarea { min-height: 60px; resize: vertical; }
        .modal .actions { display: flex; gap: 8px; margin-top: 16px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
        .btn-gold { background: var(--accent); color: #000; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 4px; }

        /* Nav */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(5,5,8,0.95); backdrop-filter: blur(12px);
            border-top: 1px solid var(--border); display: flex;
            padding: 6px 0 env(safe-area-inset-bottom, 6px); z-index: 20;
        }
        nav a { flex: 1; text-align: center; color: var(--muted); text-decoration: none; font-size: 10px; padding: 4px 0; }
        nav a.active { color: var(--accent); }
        nav a .ni { font-size: 17px; display: block; margin-bottom: 1px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .toast { position: fixed; bottom: 90px; left: 12px; right: 12px; background: var(--red); color: #fff; padding: 10px 14px; border-radius: 10px; font-size: 12px; display: none; z-index: 100; }
        .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <header>
        <div><h1>⚡ Pulso<span>Connect</span></h1><div class="timestamp" id="clock">--</div></div>
        <div style="font-size:12px;color:var(--muted)"><span class="sdot online"></span>Live</div>
    </header>

    <!-- ===== DASHBOARD ===== -->
    <div class="tab-content active" id="tab-dashboard">
        <div class="stats-row" id="stats"></div>
        <div class="sect">📡 Sistemas</div>
        <div class="sys-grid" id="systems"></div>
        <div class="sect">📈 KPIs</div>
        <div class="stats-row" id="kpi-stats"></div>
        <div class="sect">📜 Actividad</div>
        <div id="activity"></div>
    </div>

    <!-- ===== SERVICIOS ===== -->
    <div class="tab-content" id="tab-servicios">
        <div class="sect">
            🛠️ Servicios
            <button class="btn btn-gold btn-sm" onclick="openServiceModal()">+ Nuevo</button>
        </div>
        <div id="servicios-list"></div>
    </div>

    <!-- ===== PIPELINE ===== -->
    <div class="tab-content" id="tab-pipeline">
        <div class="sect">
            📊 Pipeline de Ventas
            <button class="btn btn-gold btn-sm" onclick="openLeadModal()">+ Nuevo Lead</button>
        </div>
        <div class="sect" style="margin-top:4px">
            <span id="pipeline-value" style="color:var(--accent)"></span>
        </div>
        <div class="kanban" id="pipeline"></div>
    </div>

    <!-- ===== CLIENTES ===== -->
    <div class="tab-content" id="tab-clientes">
        <div class="sect">
            👥 Clientes
            <button class="btn btn-gold btn-sm" onclick="openClienteModal()">+ Nuevo</button>
        </div>
        <div class="stats-row" id="cliente-stats"></div>
        <div id="clientes-list"></div>
    </div>

    <!-- ===== FINANZAS ===== -->
    <div class="tab-content" id="tab-finanzas">
        <div class="stats-row" id="fin-stats"></div>
        <div class="sect">📈 Ingresos por Servicio</div>
        <div id="fin-services"></div>
        <div class="sect">📋 Planes</div>
        <div id="fin-plans"></div>
    </div>

    <!-- ===== CONVERSACIONES ===== -->
    <div class="tab-content" id="tab-conversaciones">
        <div class="sect">
            💬 Conversaciones
            <span id="conv-total" style="font-size:11px;color:var(--muted)"></span>
        </div>
        <div style="margin-bottom:10px">
            <input id="conv-search" type="text" placeholder="Buscar en conversaciones..." style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:13px;font-family:inherit" oninput="loadConversaciones()">
        </div>
        <div id="conv-list"></div>
        <div id="conv-pager" style="display:flex;justify-content:center;gap:8px;margin-top:12px"></div>
    </div>

    <!-- ===== PROYECTOS ===== -->
    <div class="tab-content" id="tab-proyectos">
        <div class="sect">🏗️ Proyectos & Tareas</div>
        <div id="proyectos-list"></div>
    </div>

    <!-- ===== INSIGHTS ===== -->
    <div class="tab-content" id="tab-insights">
        <div class="sect">🧠 Brain Sync · Insights</div>
        <div id="insights-list"></div>
    </div>

    <!-- ===== CONEXIONES ===== -->
    <div class="tab-content" id="tab-conexiones">
        <div class="sect">🔗 Conexiones</div>
        <div id="conexiones-list"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal"></div>
    </div>

    <nav>
        <a href="#" class="active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="ni">📊</span>Dashboard</a>
        <a href="#" data-tab="servicios" onclick="switchTab('servicios')"><span class="ni">🛠️</span>Servicios</a>
        <a href="#" data-tab="pipeline" onclick="switchTab('pipeline')"><span class="ni">📊</span>Pipeline</a>
        <a href="#" data-tab="clientes" onclick="switchTab('clientes')"><span class="ni">👥</span>Clientes</a>
        <a href="#" data-tab="finanzas" onclick="switchTab('finanzas')"><span class="ni">💰</span>Finanzas</a>
        <a href="#" data-tab="conversaciones" onclick="switchTab('conversaciones')"><span class="ni">💬</span>Chats</a>
        <a href="#" data-tab="proyectos" onclick="switchTab('proyectos')"><span class="ni">🏗️</span>Proyectos</a>
        <a href="#" data-tab="insights" onclick="switchTab('insights')"><span class="ni">🧠</span>Insights</a>
        <a href="#" data-tab="conexiones" onclick="switchTab('conexiones')"><span class="ni">🔗</span>Red</a>
    </nav>

    <script>
        // ================ CONFIG ================
        const DANTE = {
            url: 'https://pcnutiyinpyyznnfzsbo.supabase.co',
            anon: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBjbnV0aXlpbnB5eXpubmZ6c2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg1ODYwNTEsImV4cCI6MjA2NDE2MjA1MX0.wStE28TpptpsJtDQ6Jd7Wl0fAF5vSyUKUJupDXRQ140'
        };
        const EXT = {
            agentlink: { url: 'https://afospshladroetawktst.supabase.co', anon: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmb3Nwc2hsYWRyb2V0YXdrdHN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3OTE1NjQsImV4cCI6MjA4NTM2NzU2NH0.XZX4j_hVbIhr3HTZSRsxrSlh0TnFJJBatEXujSFq69o' },
            carnicero: { url: 'https://yqnjlbvyeyuwugnltxmg.supabase.co', anon: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxbmpsYnZ5ZXl1d3Vnbmx0eG1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NjAxMDIsImV4cCI6MjA4NDQzNjEwMn0.d-s9zlSgh47B6T9-BwzdX1qCKBEL_-RH1qGxSmu2mAk' },
            veritas: { url: 'https://rdoccjqvkmvobmqrvisy.supabase.co', anon: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkb2NjanZxa212b2JtcXJ2aXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNTE4NzksImV4cCI6MjA4NTkyNzg3OX0.UAAgpubj_uN1chg8-UyAB3CgEM0aG1MRLtU1mle1v_w' }
        };

        // ================ HELPERS ================
        async function sq(project, table, opts = {}) {
            const { url, anon } = (project === 'dante') ? DANTE : EXT[project];
            if (!url) return [];
            const { select = '*', limit = 50, order = 'created_at.desc', filter } = opts;
            let qs = `select=${encodeURIComponent(select)}&limit=${limit}`;
            if (order) qs += `&order=${order}`;
            if (filter) qs += `&${filter}`;
            try {
                const r = await fetch(`${url}/rest/v1/${table}?${qs}`, { headers: { apikey: anon, Authorization: `Bearer ${anon}` } });
                if (!r.ok) throw new Error(r.status);
                return await r.json();
            } catch (e) { console.warn(`${project}/${table}:`, e.message); return []; }
        }

        async function sqCount(project, table) {
            const { url, anon } = (project === 'dante') ? DANTE : EXT[project];
            try {
                const r = await fetch(`${url}/rest/v1/${table}?select=count`, { headers: { apikey: anon, Authorization: `Bearer ${anon}`, Prefer: 'count=exact' } });
                const cr = r.headers.get('content-range');
                return cr ? parseInt(cr.split('/')[1]) : 0;
            } catch (e) { return 0; }
        }

        function tag(status) {
            const m = { active: 'tag-active', idea: 'tag-idea', 'diseño': 'tag-diseno', diseño: 'tag-diseno', active: 'tag-active', wip: 'tag-wip' };
            return `<span class="tag ${m[status] || 'tag-default'}">${status || '?'}</span>`;
        }

        function timeAgo(ts) {
            if (!ts) return '—';
            const d = new Date(ts);
            const now = new Date();
            const diff = Math.floor((now - d) / 1000);
            if (diff < 60) return 'ahora';
            if (diff < 3600) return Math.floor(diff / 60) + 'm';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h';
            return Math.floor(diff / 86400) + 'd';
        }

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // ================ TABS ================
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.querySelector(`nav a[data-tab="${tab}"]`).classList.add('active');
            if (tab === 'dashboard') loadDashboard();
            else if (tab === 'servicios') loadServicios();
            else if (tab === 'pipeline') loadPipeline();
            else if (tab === 'clientes') loadClientes();
            else if (tab === 'finanzas') loadFinanzas();
            else if (tab === 'conversaciones') loadConversaciones();
            else if (tab === 'proyectos') loadProyectos();
            else if (tab === 'insights') loadInsights();
            else if (tab === 'conexiones') loadConexiones();
        }

        // ================ DASHBOARD ================
        async function loadDashboard() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            const [svcCount, projCount, taskCount, convCount, insCount, connCount,
                   alJobs, carProds, verAgents] = await Promise.all([
                sqCount('dante', 'services'), sqCount('dante', 'projects'), sqCount('dante', 'tasks'),
                sqCount('dante', 'conversaciones'), sqCount('dante', 'insights'), sqCount('dante', 'connections'),
                sq('agentlink', 'jobs', { select: 'status', limit: 50 }),
                sq('carnicero', 'products', { select: 'count', limit: 1 }),
                sq('veritas', 'agents', { select: 'count', limit: 1 })
            ]);

            // Stats
            document.getElementById('stats').innerHTML = [
                { n: svcCount, l: 'Servicios' }, { n: projCount, l: 'Proyectos' }, { n: convCount, l: 'Conversaciones' }
            ].map(s => `<div class="stat-card"><div class="num">${s.n}</div><div class="lbl">${s.l}</div></div>`).join('');

            // Systems
            const jobTotal = alJobs.length;
            const jobApplied = alJobs.filter(j => j.status === 'applied' || j.status === 'interviewing').length;
            const carCount = carProds[0]?.count || 0;
            const verCount = verAgents[0]?.count || 0;

            const systems = [
                { id: 'agentlink', name: 'AgentLink', icon: '🎯', metric: jobTotal, unit: 'jobs', online: jobTotal > 0,
                    details: [{ l: 'Aplicados', v: jobApplied }, { l: 'Contactos', v: '—' }, { l: 'Contenido', v: '—' }] },
                { id: 'lucia', name: 'Lucía', icon: '💰', metric: '1090', unit: 'txns', online: true,
                    details: [{ l: 'Cuentas', v: '11' }, { l: 'Deudas', v: '4' }, { l: 'Usuarios', v: '5' }] },
                { id: 'veritas', name: 'Veritas', icon: '⛓️', metric: verCount, unit: 'agentes', online: verCount > 0,
                    details: [{ l: 'Estado', v: verCount > 0 ? 'OK' : 'Pendiente' }, { l: 'Treasury', v: 'Sepolia' }] },
                { id: 'matarife', name: 'Matarife', icon: '🥩', metric: carCount, unit: 'productos', online: carCount > 0,
                    details: [{ l: 'Dominio', v: 'matarife.app' }, { l: 'Marketplace', v: carCount > 0 ? 'OK' : 'Setup' }] },
                { id: 'salenis', name: 'Salenis', icon: '🎬', metric: 'Live', unit: '', online: true,
                    details: [{ l: 'Dominio', v: 'salenis.com' }, { l: 'Contenido', v: 'Activo' }] }
            ];

            document.getElementById('systems').innerHTML = systems.map(s => `
                <div class="sys-card" onclick="this.classList.toggle('expanded')">
                    <h3>${s.icon} ${s.name} <span class="sdot ${s.online ? 'online' : 'pending'}"></span></h3>
                    <div class="metric">${s.metric} <span style="font-size:12px;font-weight:400;color:var(--muted)">${s.unit}</span></div>
                    <div class="details">${s.details.map(d => `<div class="dr"><span>${d.l}</span><span>${d.v}</span></div>`).join('')}</div>
                </div>
            `).join('');

            // Activity — mix of recent conversations, leads, and services
            const now = new Date();
            const weekAgo = new Date(now - 7*86400000).toISOString();

            // Fetch recent activity from multiple sources
            const [recentConv, recentLeads, recentClients] = await Promise.all([
                fetch(`/api/conversaciones?limit=3`).then(r => r.ok ? r.json() : { data: [] }).catch(() => ({ data: [] })),
                sq('dante', 'leads', { order: 'created_at.desc', limit: 3 }),
                sq('dante', 'clientes', { order: 'created_at.desc', limit: 3 })
            ]);

            const activity = [
                ...(recentConv.data || []).map(c => ({ time: timeAgo(c.timestamp), icon: '💬', text: `<strong>Chat:</strong> ${(c.mensaje_original || '').slice(0, 70)}` })),
                ...recentLeads.map(l => ({ time: timeAgo(l.created_at), icon: '📊', text: `<strong>Lead:</strong> ${l.name} — ${l.company || 'Sin empresa'} ($${l.value || 0})` })),
                ...recentClients.map(c => ({ time: timeAgo(c.created_at), icon: '👤', text: `<strong>Cliente:</strong> ${c.name} — ${c.plan || 'free'}` })),
            ].sort((a, b) => (b.time === 'ahora' ? 999 : 0) - (a.time === 'ahora' ? 999 : 0)).slice(0, 8);

            document.getElementById('activity').innerHTML = activity.length > 0 ? activity.map(a => `
                <div class="log-entry">
                    <div class="log-time">${a.time}</div><div class="log-icon">${a.icon}</div><div class="log-text">${a.text}</div>
                </div>
            `).join('') : '<div class="empty">Sin actividad reciente</div>';

            // KPI metrics
            const newLeadsWeek = sqCount('dante', 'leads'); // approximate
            const activeClients = sqCount('dante', 'clientes');
            const insightsCount = insCount;
            const processCount = sqCount('dante', 'processes');

            document.getElementById('kpi-stats').innerHTML = [
                { n: convCount, l: 'Conversaciones' },
                { n: insightsCount, l: 'Insights' },
                { n: '18', l: 'Procesos' }

        // ================ FINANZAS ================
        async function loadFinanzas() {
            let clientes = [], leads = [];
            try {
                const [cr, lr] = await Promise.all([fetch('/api/clientes'), fetch('/api/leads')]);
                if (cr.ok) clientes = await cr.json();
                if (lr.ok) leads = await lr.json();
            } catch (e) {
                [clientes, leads] = await Promise.all([
                    sq('dante', 'clientes', { order: 'created_at.desc', limit: 100 }),
                    sq('dante', 'leads', { order: 'created_at.desc', limit: 50 })
                ]);
            }

            const svcs = await sq('dante', 'services', { order: 'label.asc', limit: 20 });
            const svcMap = {}; svcs.forEach(s => svcMap[s.id] = s.label);

            // MRR = sum of active client pricing
            const activos = clientes.filter(c => c.status === 'activo');
            const mrr = activos.reduce((s, c) => s + (parseFloat(c.pricing) || 0), 0);
            const arr = mrr * 12;

            // Pipeline value
            const pipelineVal = leads.filter(l => l.status !== 'cerrado_perdido').reduce((s, l) => s + (parseFloat(l.value) || 0), 0);

            // Churn (inactivos + cancelados / total)
            const churned = clientes.filter(c => c.status === 'inactivo' || c.status === 'cancelado').length;
            const churnRate = clientes.length > 0 ? ((churned / clientes.length) * 100).toFixed(1) : '0';

            // Stats
            document.getElementById('fin-stats').innerHTML = [
                { n: '$' + mrr.toLocaleString(), l: 'MRR/mes' },
                { n: '$' + arr.toLocaleString(), l: 'ARR/año' },
                { n: '$' + pipelineVal.toLocaleString(), l: 'Pipeline' },
                { n: churnRate + '%', l: 'Churn' }
            ].map(s => `<div class="stat-card"><div class="num">${s.n}</div><div class="lbl">${s.l}</div></div>`).join('');

            // Revenue by service
            const svcRevenue = {};
            activos.forEach(c => {
                (c.servicios || []).forEach(sid => {
                    const share = (c.pricing || 0) / ((c.servicios || []).length || 1);
                    svcRevenue[sid] = (svcRevenue[sid] || 0) + share;
                });
            });
            document.getElementById('fin-services').innerHTML = Object.entries(svcRevenue)
                .sort((a, b) => b[1] - a[1])
                .map(([sid, rev]) => {
                    const pct = mrr > 0 ? ((rev / mrr) * 100).toFixed(0) : 0;
                    const w = mrr > 0 ? ((rev / mrr) * 100).toFixed(0) : 0;
                    return `
                    <div class="lcard">
                        <div class="top"><span class="title">${svcMap[sid] || sid?.slice(0,8)}</span><span style="color:var(--accent)">$${rev.toFixed(0)}/mes</span></div>
                        <div style="height:4px;background:var(--border);border-radius:2px;margin-top:6px">
                            <div style="height:100%;width:${w}%;background:var(--accent);border-radius:2px"></div>
                        </div>
                        <div style="font-size:10px;color:var(--muted);margin-top:2px">${pct}% del MRR</div>
                    </div>`;
                }).join('') || '<div class="empty">Sin datos de ingresos</div>';

            // Plan distribution
            const plans = {};
            clientes.forEach(c => { plans[c.plan || 'free'] = (plans[c.plan || 'free'] || 0) + 1; });
            const maxPlan = Math.max(1, ...Object.values(plans));
            document.getElementById('fin-plans').innerHTML = Object.entries(plans)
                .sort((a, b) => b[1] - a[1])
                .map(([plan, count]) => {
                    const w = ((count / maxPlan) * 100).toFixed(0);
                    return `
                    <div class="lcard">
                        <div class="top"><span class="title">${plan}</span><span>${count} clientes</span></div>
                        <div style="height:4px;background:var(--border);border-radius:2px;margin-top:4px">
                            <div style="height:100%;width:${w}%;background:var(--purple);border-radius:2px"></div>
                        </div>
                    </div>`;
                }).join('') || '<div class="empty">Sin datos</div>';
        }

        // ================ CONVERSACIONES ================
        let convPage = 0, convLimit = 30;
        async function loadConversaciones() {
            const q = document.getElementById('conv-search')?.value || '';
            const offset = convPage * convLimit;
            try {
                const r = await fetch(`/api/conversaciones?q=${encodeURIComponent(q)}&limit=${convLimit}&offset=${offset}`);
                if (!r.ok) throw new Error(r.status);
                const { data, total } = await r.json();

                document.getElementById('conv-total').textContent = `${total} conversaciones`;
                document.getElementById('conv-list').innerHTML = data.map(c => `
                    <div class="lcard" onclick="this.classList.toggle('expanded')">
                        <div class="top">
                            <span class="title" style="font-size:12px">${(c.mensaje_original || '').slice(0, 80)}</span>
                            <span style="font-size:10px;color:var(--muted)">${timeAgo(c.timestamp)}</span>
                        </div>
                        <div class="desc-full" style="margin-top:8px;font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto">${c.respuesta_ia || '(sin respuesta)'}</div>
                        ${c.es_error ? '<div style="color:var(--red);font-size:10px;margin-top:4px">⚠️ Error</div>' : ''}
                    </div>
                `).join('') || '<div class="empty">No se encontraron conversaciones</div>';

                // Pager
                const totalPages = Math.ceil(total / convLimit);
                document.getElementById('conv-pager').innerHTML = totalPages > 1 ? `
                    <button class="btn btn-ghost btn-sm" onclick="convPage=Math.max(0,convPage-1);loadConversaciones()" ${convPage===0?'disabled':''}>←</button>
                    <span style="font-size:12px;color:var(--muted);padding:4px 8px">${convPage+1} / ${totalPages}</span>
                    <button class="btn btn-ghost btn-sm" onclick="convPage=Math.min(${totalPages-1},convPage+1);loadConversaciones()" ${convPage>=totalPages-1?'disabled':''}>→</button>
                ` : '';
            } catch (e) {
                document.getElementById('conv-list').innerHTML = '<div class="empty">Error cargando conversaciones</div>';
            }
        }

        // ================ INIT ================
        loadDashboard().catch(e => toast('Error: ' + e.message));
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);
        setInterval(() => {
            if (document.getElementById('tab-dashboard').classList.contains('active')) loadDashboard();
        }, 60000);
    </script>
</body>
</html>
