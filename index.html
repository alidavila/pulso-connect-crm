<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PulsoConnect Command Center</title>
    <style>
        :root {
            --bg: #08080d;
            --card: #111118;
            --border: #1e1e2a;
            --text: #c8c8d0;
            --muted: #6b6b78;
            --accent: #00e676;
            --purple: #7c3aed;
            --warn: #eab308;
            --danger: #ef4444;
            --blue: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px 10px 80px;
            font-size: 14px;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 4px 14px;
            position: sticky; top: 0; background: var(--bg); z-index: 10;
        }
        header h1 { font-size: 18px; font-weight: 700; color: #fff; }
        header h1 span { color: var(--accent); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .status-dot.pending { background: var(--warn); }
        .status-dot.offline { background: var(--danger); }
        .timestamp { font-size: 11px; color: var(--muted); }

        /* System Grid */
        .systems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 16px;
        }
        .sys-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all .2s;
            position: relative;
            overflow: hidden;
        }
        .sys-card:active { transform: scale(0.97); }
        .sys-card.expanded { border-color: var(--accent); }
        .sys-card h3 { font-size: 13px; color: #fff; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .sys-card .metric { font-size: 22px; font-weight: 700; color: var(--accent); margin: 6px 0; }
        .sys-card .sub { font-size: 11px; color: var(--muted); }
        .sys-card .details { display: none; margin-top: 10px; font-size: 11px; }
        .sys-card.expanded .details { display: block; }
        .sys-card .detail-row { display: flex; justify-content: space-between; padding: 3px 0; color: var(--muted); }
        .sys-card .detail-row span:last-child { color: var(--text); font-weight: 500; }
        .badge { 
            display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600;
        }
        .badge-new { background: rgba(124,58,237,0.2); color: var(--purple); }
        .badge-applied { background: rgba(59,130,246,0.2); color: var(--blue); }
        .badge-ready { background: rgba(0,230,118,0.15); color: var(--accent); }

        /* Activity */
        .section-title {
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted); margin: 18px 0 8px; font-weight: 600;
        }
        .log-entry {
            display: flex; gap: 10px; padding: 8px 10px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; margin-bottom: 4px; font-size: 12px;
        }
        .log-time { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; min-width: 50px; }
        .log-icon { font-size: 14px; }
        .log-text { flex: 1; }

        /* Kanban */
        .kanban { display: grid; gap: 8px; }
        .kanban-col { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
        .kanban-col h4 { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
        .kanban-col h4 span { color: var(--text); }
        .kanban-card { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px; margin-bottom: 6px; font-size: 12px;
        }
        .kanban-card .tag { font-size: 10px; color: var(--purple); margin-bottom: 3px; }
        .kanban-card .title { color: #fff; font-weight: 500; }

        /* Nav */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(8,8,13,0.95); backdrop-filter: blur(10px);
            border-top: 1px solid var(--border); display: flex;
            padding: 8px 0 env(safe-area-inset-bottom, 8px);
        }
        nav a {
            flex: 1; text-align: center; color: var(--muted); text-decoration: none;
            font-size: 10px; padding: 6px 0;
        }
        nav a.active { color: var(--accent); }
        nav a .nav-icon { font-size: 18px; display: block; margin-bottom: 2px; }

        /* Loading */
        .skeleton { background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.03) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .error-toast { 
            position: fixed; bottom: 80px; left: 12px; right: 12px;
            background: var(--danger); color: #fff; padding: 10px 14px;
            border-radius: 10px; font-size: 12px; display: none; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="error-toast" id="toast"></div>

    <header>
        <div>
            <h1>⚡ Pulso<span>Connect</span></h1>
            <div class="timestamp" id="clock">Conectando...</div>
        </div>
        <div style="font-size:12px;color:var(--muted)"><span class="status-dot online"></span>Live</div>
    </header>

    <!-- System Health -->
    <div class="section-title">📡 Sistemas</div>
    <div class="systems-grid" id="systems"></div>

    <!-- Kanban HDS -->
    <div class="section-title">📋 Tareas HDS</div>
    <div class="kanban" id="kanban">
        <div class="kanban-col"><h4>⏳ Pendientes <span id="cnt-pending">0</span></h4><div id="col-pending"></div></div>
        <div class="kanban-col"><h4>🔄 En Progreso <span id="cnt-progress">0</span></h4><div id="col-progress"></div></div>
        <div class="kanban-col"><h4>✅ Completado <span id="cnt-done">0</span></h4><div id="col-done"></div></div>
    </div>

    <!-- Activity -->
    <div class="section-title">📜 Actividad Reciente</div>
    <div id="activity"></div>

    <nav>
        <a href="#" class="active" onclick="showTab('dashboard');return false"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="https://github.com/alidavila/pulso-connect-crm/issues" target="_blank"><span class="nav-icon">📋</span>Tareas</a>
        <a href="#" onclick="showTab('metrics');return false"><span class="nav-icon">📈</span>Métricas</a>
        <a href="https://github.com/alidavila/pulso-connect-crm/projects" target="_blank"><span class="nav-icon">⚙️</span>GitHub</a>
    </nav>

    <script>
        // ==================== CONFIG ====================
        const SUPABASE_PROJECTS = {
            agentlink: { url: 'https://afospshladroetawktst.supabase.co', anon: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmb3Nwc2hsYWRyb2V0YXdrdHN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3OTE1NjQsImV4cCI6MjA4NTM2NzU2NH0.XZX4j_hVbIhr3HTZSRsxrSlh0TnFJJBatEXujSFq69o' },
            veritas:   { url: 'https://rdoccjqvkmvobmqrvisy.supabase.co', anon: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkb2NjanZxa212b2JtcXJ2aXN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzNTE4NzksImV4cCI6MjA4NTkyNzg3OX0.UAAgpubj_uN1chg8-UyAB3CgEM0aG1MRLtU1mle1v_w' },
            carnicero: { url: 'https://yqnjlbvyeyuwugnltxmg.supabase.co', anon: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlxbmpsYnZ5ZXl1d3Vnbmx0eG1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4NjAxMDIsImV4cCI6MjA4NDQzNjEwMn0.d-s9zlSgh47B6T9-BwzdX1qCKBEL_-RH1qGxSmu2mAk' }
        };

        // ==================== SUPABASE QUERY ====================
        async function supabaseRPC(project, table, select = '*', limit = 10) {
            const { url, anon } = SUPABASE_PROJECTS[project];
            try {
                const query = `select=${encodeURIComponent(select)}&limit=${limit}&order=created_at.desc`;
                const resp = await fetch(`${url}/rest/v1/${table}?${query}`, {
                    headers: { 'apikey': anon, 'Authorization': `Bearer ${anon}` }
                });
                if (!resp.ok) throw new Error(`${resp.status}`);
                return await resp.json();
            } catch (e) {
                console.warn(`${project}/${table}: ${e.message}`);
                return [];
            }
        }

        // ==================== AGGREGATE API ====================
        async function fetchAggregate() {
            try {
                const resp = await fetch('/api/aggregate');
                if (!resp.ok) throw new Error(`${resp.status}`);
                return await resp.json();
            } catch (e) {
                console.warn('aggregate API:', e.message);
                return null;
            }
        }

        // ==================== RENDER ====================
        async function loadDashboard() {
            // Clock
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            // Try aggregate API first (server-side, has service_role access)
            const agg = await fetchAggregate();

            // Fallback: query Supabase directly with anon keys
            const [agentlinkJobs, agentlinkContacts, carniceroData, veritasData] = await Promise.all([
                supabaseRPC('agentlink', 'jobs', 'status,company_name,job_title', 20),
                supabaseRPC('agentlink', 'contacts', 'count', 1),
                supabaseRPC('carnicero', 'products', 'count', 1),
                supabaseRPC('veritas', 'agents', 'count', 1)
            ]);

            // Job stats
            const jobCount = agentlinkJobs.length;
            const applied = agentlinkJobs.filter(j => j.status === 'applied' || j.status === 'interviewing').length;
            const newJobs = agentlinkJobs.filter(j => j.status === 'new' || j.status === 'saved').length;

            // Contacts
            const contactCount = agentlinkContacts[0]?.count || '?';

            // Render system cards
            const systems = [
                { 
                    id: 'agentlink', name: 'AgentLink', icon: '🎯',
                    metric: jobCount, unit: 'jobs',
                    online: true,
                    details: [
                        { label: 'Aplicados', value: applied },
                        { label: 'Nuevos', value: newJobs },
                        { label: 'Contactos', value: contactCount }
                    ]
                },
                { 
                    id: 'veritas', name: 'Veritas', icon: '⛓️',
                    metric: veritasData[0]?.count || 0, unit: 'agentes',
                    online: veritasData.length > 0,
                    details: [
                        { label: 'Dashboard', value: veritasData.length > 0 ? 'OK' : 'Pendiente' },
                        { label: 'Treasury', value: 'Sepolia' }
                    ]
                },
                { 
                    id: 'carnicero', name: 'Carnicero', icon: '🥩',
                    metric: carniceroData[0]?.count || 0, unit: 'productos',
                    online: carniceroData.length > 0,
                    details: [
                        { label: 'Marketplace', value: carniceroData.length > 0 ? 'OK' : 'Pendiente' }
                    ]
                }
            ];

            const grid = document.getElementById('systems');
            grid.innerHTML = systems.map(sys => `
                <div class="sys-card" onclick="toggleCard(this)" id="card-${sys.id}">
                    <h3>${sys.icon} ${sys.name} 
                        <span class="status-dot ${sys.online ? 'online' : 'pending'}"></span>
                    </h3>
                    <div class="metric">${sys.metric} <span style="font-size:12px;font-weight:400;color:var(--muted)">${sys.unit}</span></div>
                    <div class="details">
                        ${sys.details.map(d => `<div class="detail-row"><span>${d.label}</span><span>${d.value}</span></div>`).join('')}
                    </div>
                </div>
            `).join('');

            // Activity log (from aggregate or fallback)
            const activity = agg?.activity || [
                { time: new Date().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'}), icon: '📊', text: `AgentLink: ${jobCount} jobs, ${applied} aplicados` },
                { time: new Date().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'}), icon: '🏗️', text: 'CRM desplegado en Vercel' },
                { time: '--', icon: '🔧', text: 'Conexión Supabase activa' }
            ];

            document.getElementById('activity').innerHTML = activity.map(log => `
                <div class="log-entry">
                    <div class="log-time">${log.time}</div>
                    <div class="log-icon">${log.icon}</div>
                    <div class="log-text">${log.text}</div>
                </div>
            `).join('');

            // Kanban — fetch real GitHub issues from aggregate API
            const tasks = agg?.tasks || [];
            const pending = tasks.filter(t => t.status === 'pending');
            const progress = tasks.filter(t => t.status === 'progress');
            const done = tasks.filter(t => t.status === 'done');

            function renderCol(colId, taskList) {
                const el = document.getElementById(`col-${colId}`);
                document.getElementById(`cnt-${colId}`).textContent = taskList.length;
                if (taskList.length === 0) {
                    el.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:8px;text-align:center">—</div>';
                    return;
                }
                el.innerHTML = taskList.map(t => `
                    <div class="kanban-card" onclick="window.open('${t.url}','_blank')" style="cursor:pointer">
                        <div class="tag">#${t.number}</div>
                        <div class="title">${t.title}</div>
                        <div style="color:var(--muted);font-size:10px;margin-top:4px">@${t.assignee}</div>
                    </div>
                `).join('');
            }

            renderCol('pending', tasks.pending);
            renderCol('progress', tasks.progress);
            renderCol('done', tasks.done);
        }

        function toggleCard(card) {
            card.classList.toggle('expanded');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function showTab(tab) {
            if (tab === 'metrics') {
                document.getElementById('activity').innerHTML = `
                    <div class="log-entry">
                        <div class="log-icon">📊</div>
                        <div class="log-text">
                            <strong>Gestión de tareas:</strong> 
                            <a href="https://github.com/alidavila/pulso-connect-crm/issues" target="_blank" style="color:var(--accent)">GitHub Issues →</a>
                        </div>
                    </div>
                    <div class="log-entry">
                        <div class="log-icon">📋</div>
                        <div class="log-text">
                            <strong>Kanban board:</strong> 
                            <a href="https://github.com/alidavila/pulso-connect-crm/projects" target="_blank" style="color:var(--accent)">GitHub Projects →</a>
                        </div>
                    </div>
                    <div class="log-entry">
                        <div class="log-icon">💡</div>
                        <div class="log-text">Las tareas se crean como issues en GitHub. El dashboard las muestra automáticamente.</div>
                    </div>
                `;
            }
        }

        // ==================== INIT ====================
        loadDashboard().catch(e => showToast('Error cargando dashboard: ' + e.message));
        setInterval(loadDashboard, 60000); // Refresh every 60s
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-VE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);
    </script>
</body>
</html>
